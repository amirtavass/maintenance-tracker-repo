version: "3.8"

services:
  backend:
    build: ./server
    container_name: maintenance-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: always

  frontend:
    build:
      context: ./client
      args:
        - NEXT_PUBLIC_API_URL=http://16.171.20.152:5000
    container_name: maintenance-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
